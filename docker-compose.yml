version: '3.8'

services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cherry-portfolio
    ports:
      - "8111:8111"
    restart: unless-stopped

  # Development service (optional)
  dev:
    image: node:18-alpine
    container_name: cherry-portfolio-dev
    working_dir: /app
    ports:
      - "8111:5173"
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    profiles:
      - dev
