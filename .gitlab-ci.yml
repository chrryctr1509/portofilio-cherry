stages:
  - build
  - deploy

variables:
  SSH_USER: "poccongbalap"
  SSH_HOST: "103.150.227.248"
  SSH_PORT: "1509"
  
  # Private key provided by user. 
  # SECURITY NOTE: It is recommended to use GitLab CI/CD Variables (Settings > CI/CD > Variables) 
  # instead of hardcoding sensitive keys in the repository.
  SSH_PRIVATE_KEY: |
    -----BEGIN OPENSSH PRIVATE KEY-----
    b3BlbnNzaC1rZXktdjEAAAAABG5vbmUAAAAEbm9uZQAAAAAAAAABAAAAMwAAAAtzc2gtZW
    QyNTUxOQAAACAhZkmQRJ7/VuUlplgjEm/M0vg6WioMJPVmEw4gjCHfWAAAAKCj93y3o/d8
    twAAAAtzc2gtZWQyNTUxOQAAACAhZkmQRJ7/VuUlplgjEm/M0vg6WioMJPVmEw4gjCHfWA
    AAAEAYXne+2vV1lEZvKCwBgOQJ0ydDI4dOcsONG/khDfW0QiFmSZBEnv9W5SWmWCMSb8zS
    +DpaKgwk9WYTDiCMId9YAAAAFm1zaSB0aGluQENIRVJSUlJSUlJSUlIBAgMEBQYH
    -----END OPENSSH PRIVATE KEY-----
  
  IMAGE_TAG: "$CI_REGISTRY_IMAGE/portfolio:latest"
  CONTAINER_NAME: "cherry-portfolio"
  HOST_PORT: "8111"
  CONTAINER_PORT: "8111"

build-push:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin $CI_REGISTRY
    - docker build -t $IMAGE_TAG .
    - docker push $IMAGE_TAG

deploy:
  stage: deploy
  image: alpine:latest
  needs: ["build-push"]
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -p $SSH_PORT $SSH_HOST >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
  script:
    - echo "Deploying to $SSH_HOST..."
    - |
      ssh -p $SSH_PORT $SSH_USER@$SSH_HOST "
        docker login -u '$CI_REGISTRY_USER' --password-stdin '$CI_REGISTRY' <<< '$CI_REGISTRY_PASSWORD'
        docker pull $IMAGE_TAG
        
        echo 'Checking for containers using port $HOST_PORT...'
        
        # 1. Stop container with our specific name if it exists
        docker stop $CONTAINER_NAME || true
        docker rm -f $CONTAINER_NAME || true
        
        # 2. Stop any other container occupying port $HOST_PORT to avoid conflicts
        EXISTING_ID=\$(docker ps -q --filter publish=$HOST_PORT)
        if [ ! -z \"\$EXISTING_ID\" ]; then
          echo \"Found conflicting container on port $HOST_PORT (ID: \$EXISTING_ID), stopping...\"
          docker stop \$EXISTING_ID
          docker rm -f \$EXISTING_ID
        fi
        
        # Run new container
        docker run -d \
          --name $CONTAINER_NAME \
          --restart always \
          -p $HOST_PORT:$CONTAINER_PORT \
          $IMAGE_TAG
      "
  environment:
    name: production
